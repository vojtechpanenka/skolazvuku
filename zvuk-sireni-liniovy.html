<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liniový zdroj zvuku</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f2ec;
    color: #1a1714;
    font-family: 'DM Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }
  header {
    padding: 1.2rem 2rem 0;
    display: flex;
    align-items: baseline;
    gap: 1.2rem;
    flex-wrap: wrap;
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 1.25rem; }
  h1 em { font-style: italic; color: #c0392b; }
  .hint { font-size: 0.62rem; color: #9a9590; letter-spacing: 0.08em; }
  .controls { margin-left: auto; display: flex; gap: 1.4rem; align-items: center; flex-wrap: wrap; }
  .ctrl { display: flex; flex-direction: column; gap: 0.2rem; align-items: flex-end; }
  .ctrl label { font-size: 0.57rem; color: #9a9590; letter-spacing: 0.1em; text-transform: uppercase; }
  input[type="range"] {
    -webkit-appearance: none; width: 80px; height: 1px;
    background: #9a9590; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 11px; height: 11px;
    border-radius: 50%; background: #1a1714; cursor: pointer;
  }
  .btn {
    font-family: 'DM Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #9a9590; background: none; border: 1px solid currentColor;
    padding: 0.3rem 0.7rem; cursor: pointer; border-radius: 1px; transition: color 0.15s;
  }
  .btn:hover { color: #1a1714; }
  canvas { display: block; width: 100%; touch-action: none; -webkit-user-select: none; user-select: none; }
  #c { flex: 1; }
  #profile { flex: none; height: 80px; }
  footer { padding: 0.5rem 2rem; display: flex; gap: 2rem; align-items: center; }
  .legend { margin-left: auto; display: flex; gap: 1.2rem; align-items: center; font-size: 0.56rem; color: #9a9590; }
  .legend-item { display: flex; gap: 0.4rem; align-items: center; }
  .ldot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>
<header>
  <h1>Liniový <em>zdroj</em> zvuku</h1>
  <span class="hint">Klikněte na zdroj</span>
  <div class="controls">
    <div class="ctrl">
      <label>Rychlost vlny</label>
      <input type="range" id="spdSlider" min="50" max="250" step="5" value="150">
    </div>
    <div class="ctrl">
      <label>Amplituda</label>
      <input type="range" id="ampSlider" min="10" max="40" step="1" value="25">
    </div>
    <div class="ctrl">
      <label>Vlnová délka</label>
      <input type="range" id="sigSlider" min="15" max="240" step="5" value="125">
    </div>
    <button class="btn" id="pauseBtn" onclick="togglePause()" style="min-width:6.5rem">Pauza</button>
    <button class="btn" onclick="resetAll()">Reset</button>
  </div>
</header>
<canvas id="c"></canvas>
<canvas id="profile" height="80" style="display:block; width:100%; border-top:1px solid rgba(26,23,20,0.08);"></canvas>
<footer>
  <div id="lambdaInfo" style="font-size:0.62rem;color:#9a9590;">λ = —</div>
  <div id="modeInfo" style="font-size:0.62rem;color:#9a9590;">—</div>
  <div class="legend">
    <div class="legend-item"><div class="ldot" style="background:#c0392b;opacity:0.85"></div>zhuštění — čelo vlny</div>
    <div class="legend-item"><div class="ldot" style="background:#2471a3;opacity:0.85"></div>zředění — za vlnou</div>
    <div class="legend-item"><div class="ldot" style="background:#1a1714;opacity:0.18"></div>klidová poloha</div>
  </div>
</footer>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const profCanvas = document.getElementById('profile');
const profCtx = profCanvas.getContext('2d');
let W, H, PW, PH;
let particles = [];
let waves = [];
let lastTime = null;
let paused = false;
let holding = false;
let holdTimer = null;

const P_RAD = 3.5;

// ── liniový zdroj ─────────────────────────────────────────────────────────────
// Obdélník vlevo uprostřed.
// Je modelován jako N bodových zdrojů rozmístěných vertikálně.
// Interference jejich vln způsobí, že výsledná vlna je rovná (kolimovaná)
// v ose dopředu a slábne do stran — přesně jako skutečný liniový zdroj.

const LINE_X       = 28;     // x pozice středu obdélníku
const LINE_W       = 18;     // šířka obdélníku (vizuální)
const LINE_H_FRAC  = 0.31;   // nepoužito — výška je fixní
const LINE_H_PX    = 160;    // fixní výška zdroje v pixelech
const N_SUBSOURCES = 24;

function lineTop()    { return H / 2 - LINE_H_PX / 2; }
function lineBottom() { return H / 2 + LINE_H_PX / 2; }
function lineLen()    { return LINE_H_PX; }
function lineCX()     { return LINE_X + LINE_W / 2; }
function lineCY()     { return H / 2; }

// Vrátí pole y-souřadnic podszdrojů
function subSourcePositions() {
  const top = lineTop(), len = lineLen();
  const pts = [];
  for (let i = 0; i < N_SUBSOURCES; i++) {
    pts.push(top + (i + 0.5) * len / N_SUBSOURCES);
  }
  return pts;
}

function waveSpeed() { return parseFloat(document.getElementById('spdSlider').value); }
function amplitude()  { return parseFloat(document.getElementById('ampSlider').value); }
// Slider udává vlnovou délku λ přímo v pixelech.
// sigma je šířka Gaussiánu: λ ≈ sigma × 4.8, tedy sigma = λ / 4.8
function lambdaPx()   { return parseFloat(document.getElementById('sigSlider').value); }
function sigma()      { return lambdaPx() / 4.8; }

function updateLambdaDisplay() {
  if (!H) return;
  const lam  = lambdaPx();
  const srcL = lineLen();
  const ratio = lam / srcL;
  let mode;
  if (ratio > 2)        mode = 'všesměrový  (λ ≫ L)';
  else if (ratio > 0.5) mode = 'přechod  (λ ≈ L)';
  else                  mode = 'směrový  (λ ≪ L)';
  document.getElementById('lambdaInfo').textContent =
    `λ = ${lam.toFixed(0)} px   L = ${srcL.toFixed(0)} px   λ/L = ${ratio.toFixed(2)}`;
  document.getElementById('modeInfo').textContent = mode;
}

// ── grid částic ───────────────────────────────────────────────────────────────
// Fixní rozestup mezi částicemi — počet se mění s velikostí okna.
const SPACING = 28;   // px mezi částicemi (horizontálně i vertikálně)

function buildGrid() {
  particles = [];
  const startX = LINE_X + LINE_W + 24;
  const marginY = 44;
  const dx = SPACING;
  const dy = SPACING;

  const cols = Math.floor((W - startX - 20) / dx);
  const rows = Math.floor((H - marginY * 2) / dy);
  const offsetX = startX;
  const offsetY = marginY + ((H - marginY * 2) - (rows - 1) * dy) / 2;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const hexShift = (r % 2) * dx * 0.5;
      const rx = offsetX + c * dx + hexShift;
      const ry = offsetY + r * dy;
      if (rx > W - 10) continue;
      particles.push({ rx, ry, x: rx, y: ry, disp: 0, dot: 0 });
    }
  }
}

// ── vlny ──────────────────────────────────────────────────────────────────────
// Každé kliknutí vytvoří sadu N vln — jednu z každého podsdroje.
function emitWaves() {
  const subY = subSourcePositions();
  const sx = lineCX();
  subY.forEach(sy => {
    waves.push({ ox: sx, oy: sy, r: 0 });
  });
}

// ── displacement profil (stejný jako vsesmerovy zdroj) ────────────────────────
function displacementProfile(delta, sig) {
  const sep  = sig * 2.4;
  const comp =  Math.exp(-(delta * delta) / (2 * sig * sig));
  const rare = -Math.exp(-((delta + sep) * (delta + sep)) / (2 * sig * sig));
  return comp + rare;
}

// ── update částic ─────────────────────────────────────────────────────────────
// Každá částice cítí příspěvek od všech podszdrojů.
// Superpozice interference: dopředu se vlny sčítají (konstruktivní),
// do stran se ruší (destruktivní) — to je fyzika liniového zdroje.
function updateParticles() {
  const amp = amplitude();
  const sig = sigma();

  for (const p of particles) {
    let totalDispX = 0, totalDispY = 0;

    for (const w of waves) {
      const ddx  = p.rx - w.ox;
      const ddy  = p.ry - w.oy;
      const dist = Math.sqrt(ddx*ddx + ddy*ddy) || 1;
      const nx   = ddx / dist;
      const ny   = ddy / dist;

      const delta = dist - w.r;
      const u     = displacementProfile(delta, sig) * amp;

      // útlum 1/sqrt(r) pro válcovou vlnu od každého podsdroje
      const atten = Math.sqrt(55 / Math.max(dist, 55));

      totalDispX += nx * u * atten;
      totalDispY += ny * u * atten;
    }

    // Normalizace: dělíme počtem podszdrojů aby amplituda zůstala srovnatelná
    totalDispX /= N_SUBSOURCES;
    totalDispY /= N_SUBSOURCES;

    p.x = p.rx + totalDispX;
    p.y = p.ry + totalDispY;
    p.disp = Math.sqrt(totalDispX*totalDispX + totalDispY*totalDispY);

    // dot: kladný = pohyb od zdroje (komprese), záporný = k zdroji (rarefakce)
    const orx = p.rx - lineCX(), ory = p.ry - lineCY();
    const orLen = Math.sqrt(orx*orx + ory*ory) || 1;
    p.dot = p.disp > 0.05
      ? (totalDispX * orx + totalDispY * ory) / (orLen * p.disp)
      : 0;
  }
}

// ── kreslení vlnoploch ────────────────────────────────────────────────────────
// Vlnoplochy jsou kresleny z každého podsdroje samostatně.
// Vizuálně to ukáže, jak se kruhové vlny od každého bodu skládají dohromady.
function drawWaves() {
  const sig = sigma();
  const sep = sig * 2.4;

  // Skupina vln = N_SUBSOURCES vln emitovaných najednou
  // Seskupíme je po skupinách (emitovány ve stejný čas → stejné r)
  const groups = new Map();
  for (const w of waves) {
    const key = Math.round(w.r * 10);  // zaokrouhlíme pro grouping
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(w);
  }

  groups.forEach(grp => {
    const fade = Math.max(0, 1 - grp[0].r / (Math.max(W, H) * 0.88));
    if (fade < 0.005) return;

    grp.forEach(w => {
      if (w.r < 5) return;
      drawRing(w.ox, w.oy, w.r,       28, [192, 57,  43], 0.22 * fade);
      if (w.r > sep + 5)
        drawRing(w.ox, w.oy, w.r - sep, 22, [36, 113, 163], 0.15 * fade);
    });
  });
}

function drawRing(ox, oy, r, width, rgb, maxAlpha) {
  if (r - width / 2 < 1) return;
  const g = ctx.createRadialGradient(ox, oy, Math.max(0, r - width/2), ox, oy, r + width/2);
  g.addColorStop(0,   `rgba(${rgb},0)`);
  g.addColorStop(0.4, `rgba(${rgb},${maxAlpha})`);
  g.addColorStop(0.6, `rgba(${rgb},${maxAlpha})`);
  g.addColorStop(1,   `rgba(${rgb},0)`);
  ctx.beginPath();
  ctx.arc(ox, oy, r + width/2, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();
}

// ── kreslení částic ───────────────────────────────────────────────────────────
function drawParticles() {
  const amp = amplitude();

  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.rx, p.ry, 1.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(26,23,20,0.10)';
    ctx.fill();

    const t = Math.min(1, p.disp / (amp * 0.9));
    let r, g, b, alpha, drawR;
    if (p.dot >= 0) {
      r = Math.round(26 + t*166); g = Math.round(23 + t*12); b = Math.round(20 + t*8);
      alpha = 0.18 + t*0.78; drawR = P_RAD * (1 + t*0.55);
    } else {
      r = Math.round(26 + t*38); g = Math.round(23 + t*90); b = Math.round(20 + t*163);
      alpha = 0.18 + t*0.60; drawR = P_RAD * Math.max(0.35, 1 - t*0.40);
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, drawR), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.fill();
  }
}

// ── kreslení liniového zdroje ─────────────────────────────────────────────────
function drawSource() {
  const top  = lineTop();
  const bot  = lineBottom();
  const len  = lineLen();
  const lx   = LINE_X;
  const lw   = LINE_W;
  const cx   = lineCX();

  // Barva zdroje: průměrný stav všech podszdrojů
  let sourceDisp = 0;
  const sig = sigma();
  for (const w of waves) {
    sourceDisp += displacementProfile(-w.r, sig);
  }
  sourceDisp /= Math.max(1, N_SUBSOURCES);

  const clampedDisp = Math.max(-1, Math.min(1, sourceDisp));
  let fillColor;
  if (clampedDisp >= 0) {
    const rc = Math.round(245 + clampedDisp * (192-245));
    const gc = Math.round(242 + clampedDisp * (57-242));
    const bc = Math.round(236 + clampedDisp * (43-236));
    fillColor = `rgb(${rc},${gc},${bc})`;
  } else {
    const s2 = -clampedDisp;
    const rc = Math.round(245 + s2 * (36-245));
    const gc = Math.round(242 + s2 * (113-242));
    const bc = Math.round(236 + s2 * (163-236));
    fillColor = `rgb(${rc},${gc},${bc})`;
  }

  // Horizontální výchylka membrány (vizuální)
  const memDisp = clampedDisp * 4;

  // Tělo obdélníku (pevná ozvučnice) — pulsuje barvou
  ctx.fillStyle = fillColor;
  ctx.strokeStyle = '#1a1714';
  ctx.lineWidth = paused ? 3.5 : 1.5;
  ctx.beginPath();
  ctx.rect(lx, top, lw, len);
  ctx.fill();
  ctx.stroke();

  // Membrána — čelní panel, mírně tmavší odstín téže barvy
  ctx.fillStyle = clampedDisp >= 0
    ? `rgba(26,23,20,${clampedDisp * 0.12})`
    : `rgba(255,255,255,${(-clampedDisp) * 0.12})`;
  ctx.fillRect(lx + lw * 0.3 + memDisp, top + 3, lw * 0.55, len - 6);
  ctx.strokeStyle = '#1a1714'; ctx.lineWidth = 1;
  ctx.strokeRect(lx + lw * 0.3 + memDisp, top + 3, lw * 0.55, len - 6);

  // Svislé drážky na membráně (vizuální detail)
  ctx.strokeStyle = `rgba(26,23,20,0.12)`;
  ctx.lineWidth = 0.8;
  for (let i = 1; i < 4; i++) {
    const gy = top + (i / 4) * len;
    ctx.beginPath();
    ctx.moveTo(lx + lw*0.3 + memDisp + 2, gy);
    ctx.lineTo(lx + lw*0.85 + memDisp - 2, gy);
    ctx.stroke();
  }

  // Šrouby v rozích
  [[lx+5, top+6],[lx+5, bot-6],[lx+lw-5, top+6],[lx+lw-5, bot-6]].forEach(([sx,sy]) => {
    ctx.beginPath(); ctx.arc(sx, sy, 2.2, 0, Math.PI*2);
    ctx.fillStyle = '#aaa8a4'; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx-1.4,sy); ctx.lineTo(sx+1.4,sy);
    ctx.moveTo(sx,sy-1.4); ctx.lineTo(sx,sy+1.4);
    ctx.strokeStyle='#f5f2ec'; ctx.lineWidth=0.7; ctx.stroke();
  });

  // Popis pod zdrojem
  ctx.font = '8px "DM Mono"';
  ctx.fillStyle = 'rgba(26,23,20,0.30)';
  ctx.textAlign = 'center';
  ctx.fillText('LINIOVÝ', cx, bot + 14);
  ctx.fillText('ZDROJ', cx, bot + 24);

  // Výška zdroje — anotace
  ctx.strokeStyle = 'rgba(26,23,20,0.15)'; ctx.lineWidth = 0.8;
  ctx.setLineDash([3,3]);
  ctx.beginPath();
  ctx.moveTo(lx - 8, top); ctx.lineTo(lx - 8, bot);
  ctx.stroke();
  ctx.setLineDash([]);
  [[top,1],[bot,-1]].forEach(([y,d]) => {
    ctx.beginPath();
    ctx.moveTo(lx-11, y+d*5); ctx.lineTo(lx-8, y); ctx.lineTo(lx-5, y+d*5);
    ctx.strokeStyle='rgba(26,23,20,0.2)'; ctx.lineWidth=0.8; ctx.stroke();
  });
  ctx.save();
  ctx.translate(lx - 16, (top+bot)/2);
  ctx.rotate(-Math.PI/2);
  ctx.font = '7px "DM Mono"'; ctx.fillStyle='rgba(26,23,20,0.28)';
  ctx.textAlign='center';
  ctx.fillText(`${len.toFixed(0)} px`, 0, 0);
  ctx.restore();
}

// ── tlakový profil podél osy zdroje ──────────────────────────────────────────
// Ukazuje okamžitý tlak p(x) podél horizontální osy procházející středem zdroje.
// p(x) = součet displacementProfile(dist - w.r) pro všechny vlny,
//        kde dist = x - lineCX() (vzdálenost od ústí zdroje).
function drawProfile() {
  PW = profCanvas.width  = profCanvas.offsetWidth;
  PH = profCanvas.height = 80;

  profCtx.fillStyle = '#f5f2ec';
  profCtx.fillRect(0, 0, PW, PH);

  const sig  = sigma();
  const sep  = sig * 2.4;
  const amp  = amplitude();
  const cx   = lineCX();
  const midY = PH / 2;

  // osa
  profCtx.strokeStyle = 'rgba(26,23,20,0.15)';
  profCtx.lineWidth = 1;
  profCtx.beginPath();
  profCtx.moveTo(0, midY); profCtx.lineTo(PW, midY);
  profCtx.stroke();

  // label osy
  profCtx.font = '7px "DM Mono"';
  profCtx.fillStyle = 'rgba(26,23,20,0.28)';
  profCtx.textAlign = 'left';
  profCtx.fillText('tlak', 4, midY - 4);

  // vertikální čára na pozici zdroje
  const srcScreenX = cx;
  profCtx.strokeStyle = 'rgba(26,23,20,0.18)';
  profCtx.setLineDash([3,3]);
  profCtx.beginPath();
  profCtx.moveTo(srcScreenX, 0); profCtx.lineTo(srcScreenX, PH);
  profCtx.stroke();
  profCtx.setLineDash([]);

  if (waves.length === 0) return;

  // Vzorkujeme tlak podél celé šířky canvasu ve výšce středu zdroje
  // x na obrazovce odpovídá vzdálenosti dist = x - cx od středu zdroje
  const STEPS = PW;
  const pressures = new Float32Array(STEPS);
  let maxP = 0;

  for (let i = 0; i < STEPS; i++) {
    const screenX = i;
    const dist = screenX - cx;   // může být záporné (za zdrojem)
    if (dist < 0) continue;      // zobrazujeme jen dopředu

    let p = 0;
    for (const w of waves) {
      // Každý subsdroj přispívá — ale podél osy jsou všechny ve stejné vzdálenosti
      // (díky symetrii liniového zdroje podél osy), takže bereme jen jednu referenci
      const delta = dist - w.r;
      p += displacementProfile(delta, sig);
    }
    p /= N_SUBSOURCES;
    pressures[i] = p;
    if (Math.abs(p) > maxP) maxP = Math.abs(p);
  }

  if (maxP < 0.001) return;

  const scaleY = (PH / 2 - 6) / maxP;

  // Vyplněná plocha — červená nad osou (komprese), modrá pod (rarefakce)
  for (let i = cx + 1; i < STEPS - 1; i++) {
    const p  = pressures[i];
    const y  = midY - p * scaleY * Math.min(1, amplitude() / 22);
    const y1 = midY;

    if (Math.abs(p) < 0.005) continue;
    profCtx.fillStyle = p > 0
      ? `rgba(192,57,43,${Math.min(0.5, Math.abs(p) * 0.6)})`
      : `rgba(36,113,163,${Math.min(0.5, Math.abs(p) * 0.6)})`;
    profCtx.fillRect(i, Math.min(y, y1), 1, Math.abs(y - y1));
  }

  // Čára profilu
  profCtx.beginPath();
  profCtx.strokeStyle = '#1a1714';
  profCtx.lineWidth = 1.5;
  let first = true;
  for (let i = cx; i < STEPS; i++) {
    const p = pressures[i];
    const y = midY - p * scaleY * Math.min(1, amplitude() / 22);
    if (first) { profCtx.moveTo(i, y); first = false; }
    else profCtx.lineTo(i, y);
  }
  profCtx.stroke();

  // Svislá čára na nejbližší vlnoploche (vizuální synchronizace)
  const nearestWave = waves.reduce((a, b) => a.r < b.r ? a : b, waves[0]);
  const wfX = cx + nearestWave.r;
  if (wfX > cx && wfX < PW) {
    profCtx.strokeStyle = 'rgba(192,57,43,0.3)';
    profCtx.lineWidth = 1;
    profCtx.setLineDash([4,4]);
    profCtx.beginPath();
    profCtx.moveTo(wfX, 0); profCtx.lineTo(wfX, PH);
    profCtx.stroke();
    profCtx.setLineDash([]);
  }
}

// ── hlavní smyčka ─────────────────────────────────────────────────────────────
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.032);
  lastTime = ts;

  if (!paused) {
    const speed = waveSpeed();
    const maxR  = Math.sqrt(W*W + H*H) + 200;
    for (const w of waves) w.r += speed * dt;
    waves = waves.filter(w => w.r < maxR);
    updateParticles();
  }

  ctx.fillStyle = '#f5f2ec';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(26,23,20,0.04)'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  drawWaves();
  drawParticles();
  drawSource();
  drawProfile();

  if (!paused) requestAnimationFrame(loop);
}

// ── interakce ─────────────────────────────────────────────────────────────────
function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? 'Pokračovat' : 'Pauza';
  if (!paused) { lastTime = null; requestAnimationFrame(loop); }
}

function isOverSource(ex, ey) {
  const rect = canvas.getBoundingClientRect();
  const x = ex - rect.left;
  const y = ey - rect.top;
  return x >= LINE_X - 8 && x <= LINE_X + LINE_W + 8
      && y >= lineTop() - 8 && y <= lineBottom() + 8;
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (isOverSource(e.clientX, e.clientY)) {
    holding = true;
    canvas.setPointerCapture(e.pointerId);
    holdTimer = setTimeout(() => {
      if (holding) {
        paused = true;
        document.getElementById('pauseBtn').textContent = 'Pokračovat';
        ctx.fillStyle = '#f5f2ec'; ctx.fillRect(0,0,W,H);
        drawWaves(); drawParticles(); drawSource();
      }
    }, 150);
  }
});

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  if (!holding) return;
  clearTimeout(holdTimer);
  holding = false;
  canvas.releasePointerCapture(e.pointerId);
  if (paused) {
    paused = false; lastTime = null;
    document.getElementById('pauseBtn').textContent = 'Pauza';
    requestAnimationFrame(loop);
  } else {
    if (isOverSource(e.clientX, e.clientY)) emitWaves();
  }
});

canvas.addEventListener('pointermove', e => {
  canvas.style.cursor = isOverSource(e.clientX, e.clientY) ? 'pointer' : 'default';
});

canvas.addEventListener('pointercancel', () => { clearTimeout(holdTimer); holding = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

function resize() {
  W = canvas.width  = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
  // max vlnová délka = 2× délka zdroje
  const maxLam = Math.round(lineLen() * 2 / 5) * 5;
  document.getElementById('sigSlider').max = maxLam;
  buildGrid(); waves = [];
  updateLambdaDisplay();
}
function resetAll() { waves = []; buildGrid(); }

window.addEventListener('resize', resize);
resize();
document.getElementById('sigSlider').addEventListener('input', updateLambdaDisplay);
requestAnimationFrame(loop);
</script>
